<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PassGen • Генератор паролей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: #f2f2f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* 🔮 Glassmorphism карточка */
        .container {
            width: 420px;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 34px;
            padding: 28px 24px 32px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.12),
                0 10px 20px rgba(0, 0, 0, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        /* 🏷️ Шапка */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .header svg {
            width: 32px;
            height: 32px;
            fill: none;
            stroke: #007aff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* 🔑 Поле с паролем */
        .password-box {
            background: rgba(0, 0, 0, 0.04);
            border-radius: 16px;
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border: 1.5px solid rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            min-height: 70px;
        }
        
        .password-box:focus-within {
            border-color: #007aff;
            background: rgba(0, 122, 255, 0.05);
        }
        
        #password {
            font-size: 20px;
            font-weight: 600;
            font-family: 'SF Mono', 'Courier New', monospace;
            color: #1c1c1e;
            letter-spacing: 0.5px;
            word-break: break-all;
            flex: 1;
            margin-right: 12px;
            user-select: all;
        }
        
        /* Кнопки с SVG */
        .icon-btn {
            background: none;
            border: none;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .icon-btn:hover {
            background: rgba(0, 122, 255, 0.1);
            transform: scale(1.05);
        }
        
        .icon-btn:active {
            transform: scale(0.92);
        }
        
        .icon-btn svg {
            width: 24px;
            height: 24px;
            stroke: #007aff;
            stroke-width: 2;
            fill: none;
        }
        
        /* 📊 Индикатор сложности */
        .strength-container {
            margin-bottom: 24px;
        }
        
        .strength-bar {
            height: 6px;
            border-radius: 3px;
            background: #e5e5ea;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s;
        }
        
        .strength-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #8e8e93;
            font-weight: 500;
        }
        
        #strengthText {
            font-weight: 600;
            transition: color 0.3s;
        }
        
        /* 🏷️ Категории (iOS-стиль) */
        .category-section {
            margin-bottom: 24px;
        }
        
        .category-section label {
            font-size: 13px;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 10px;
        }
        
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
        }
        
        .category-chip {
            background: #f2f2f7;
            border: none;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            color: #1c1c1e;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
        }
        
        .category-chip svg {
            width: 18px;
            height: 18px;
            stroke: #8e8e93;
            stroke-width: 2;
            fill: none;
            flex-shrink: 0;
        }
        
        .category-chip:hover {
            background: #e5e5ea;
            transform: translateY(-1px);
        }
        
        .category-chip.active {
            background: #007aff;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        
        .category-chip.active svg {
            stroke: white;
        }
        
        .category-chip:active {
            transform: scale(0.94);
        }
        
        /* ⚙️ Настройки (аккордеон) */
        .settings-toggle {
            background: none;
            border: none;
            color: #007aff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            margin-bottom: 12px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .settings-toggle svg {
            width: 20px;
            height: 20px;
            stroke: #007aff;
            stroke-width: 2;
            fill: none;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .settings-toggle.open svg {
            transform: rotate(180deg);
        }
        
        .settings-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s, margin 0.3s;
            opacity: 0;
            margin-bottom: 0;
        }
        
        .settings-panel.open {
            max-height: 500px;
            opacity: 1;
            margin-bottom: 20px;
        }
        
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }
        
        .setting-row:last-child {
            border-bottom: none;
        }
        
        .setting-row label {
            font-size: 15px;
            color: #1c1c1e;
        }
        
        /* iOS Toggle Switch */
        .ios-switch {
            position: relative;
            width: 51px;
            height: 31px;
            flex-shrink: 0;
        }
        
        .ios-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .ios-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #e5e5ea;
            border-radius: 31px;
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .ios-slider::before {
            content: '';
            position: absolute;
            height: 27px;
            width: 27px;
            left: 2px;
            bottom: 2px;
            background: white;
            border-radius: 50%;
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        
        .ios-switch input:checked + .ios-slider {
            background: #34c759;
        }
        
        .ios-switch input:checked + .ios-slider::before {
            transform: translateX(20px);
        }
        
        /* 🎚️ Слайдер длины */
        .slider-container {
            padding: 8px 0;
        }
        
        .slider-container input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            border-radius: 2px;
            background: #e5e5ea;
            outline: none;
            transition: background 0.3s;
        }
        
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #007aff;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
            transition: all 0.2s;
        }
        
        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #007aff;
            cursor: pointer;
            border: none;
        }
        
        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #8e8e93;
            margin-top: 4px;
        }
        
        /* 🔘 Главная кнопка */
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.3);
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }
        
        .generate-btn svg {
            width: 22px;
            height: 22px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.4);
        }
        
        .generate-btn:active {
            transform: scale(0.96);
        }
        
        /* 💬 Уведомление */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 500;
            font-size: 15px;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            white-space: nowrap;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* 📱 Адаптив */
        @media (max-width: 480px) {
            .container { padding: 20px 16px; }
            .category-grid { grid-template-columns: repeat(2, 1fr); }
            #password { font-size: 17px; }
        }
        
        /* 🔄 Анимация загрузки */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .generating #password {
            animation: pulse 0.8s ease-in-out infinite;
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- Шапка -->
    <div class="header">
        <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <h1>PassGen</h1>
    </div>
    
    <!-- Поле пароля -->
    <div class="password-box">
        <span id="password">••••••••••••</span>
        <button class="icon-btn" onclick="copyPassword()" aria-label="Копировать">
            <svg viewBox="0 0 24 24">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
        </button>
    </div>
    
    <!-- Сложность -->
    <div class="strength-container">
        <div class="strength-bar">
            <div class="strength-fill" id="strengthFill" style="width: 0%;"></div>
        </div>
        <div class="strength-label">
            <span>Сложность</span>
            <span id="strengthText">—</span>
        </div>
    </div>
    
    <!-- Категории -->
    <div class="category-section">
        <label>Категории</label>
        <div class="category-grid" id="categoryGrid">
            {% for cat in categories %}
            <button class="category-chip" data-category="{{ cat }}" onclick="selectCategory('{{ cat }}')">
                <svg viewBox="0 0 24 24">
                    {% if cat == 'стандартный' %}
                    <circle cx="12" cy="12" r="10"/>
                    {% elif cat == 'супер-безопасный' %}
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    {% elif cat == 'легкий' %}
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                    {% elif cat == 'только-цифры' %}
                    <rect x="2" y="2" width="20" height="20" rx="2"/>
                    <text x="8" y="17" font-size="14" font-weight="bold" fill="currentColor">123</text>
                    {% elif cat == 'парольная-фраза' %}
                    <path d="M4 7h16M4 12h16M4 17h10"/>
                    {% else %}
                    <circle cx="12" cy="12" r="10"/>
                    {% endif %}
                </svg>
                {{ cat|capitalize }}
            </button>
            {% endfor %}
        </div>
    </div>
    
    <!-- Настройки -->
    <button class="settings-toggle" onclick="toggleSettings()">
        <svg viewBox="0 0 24 24">
            <path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>Расширенные настройки</span>
    </button>
    
    <div class="settings-panel" id="settingsPanel">
        <!-- Длина -->
        <div class="slider-container setting-row">
            <label>Длина: <span id="lengthLabel">16</span></label>
            <input type="range" id="length" min="4" max="64" value="16" 
                   oninput="updateLength(this.value)">
        </div>
        
        <div class="setting-row">
            <label>Заглавные (A-Z)</label>
            <div class="ios-switch">
                <input type="checkbox" id="uppercase" checked>
                <span class="ios-slider"></span>
            </div>
        </div>
        
        <div class="setting-row">
            <label>Строчные (a-z)</label>
            <div class="ios-switch">
                <input type="checkbox" id="lowercase" checked>
                <span class="ios-slider"></span>
            </div>
        </div>
        
        <div class="setting-row">
            <label>Цифры (0-9)</label>
            <div class="ios-switch">
                <input type="checkbox" id="digits" checked>
                <span class="ios-slider"></span>
            </div>
        </div>
        
        <div class="setting-row">
            <label>Спецсимволы (!@#)</label>
            <div class="ios-switch">
                <input type="checkbox" id="symbols" checked>
                <span class="ios-slider"></span>
            </div>
        </div>
        
        <div class="setting-row">
            <label>Исключить неоднозначные (il1O0)</label>
            <div class="ios-switch">
                <input type="checkbox" id="excludeAmbiguous">
                <span class="ios-slider"></span>
            </div>
        </div>
        
        <div class="setting-row">
            <label>Фразы (слова)</label>
            <div class="ios-switch">
                <input type="checkbox" id="useWords">
                <span class="ios-slider"></span>
            </div>
        </div>
    </div>
    
    <!-- Кнопка генерации -->
    <button class="generate-btn" onclick="generatePassword()">
        <svg viewBox="0 0 24 24">
            <path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9"/>
        </svg>
        Сгенерировать
    </button>
</div>

<!-- Toast -->
<div class="toast" id="toast">✓ Скопировано!</div>

<script>
    let activeCategory = null;
    
    function selectCategory(category) {
        activeCategory = category;
        document.querySelectorAll('.category-chip').forEach(el => {
            el.classList.toggle('active', el.dataset.category === category);
        });
        generatePassword();
    }
    
    function updateLength(val) {
        document.getElementById('lengthLabel').textContent = val;
    }
    
    function toggleSettings() {
        const panel = document.getElementById('settingsPanel');
        const btn = document.querySelector('.settings-toggle');
        panel.classList.toggle('open');
        btn.classList.toggle('open');
    }
    
    async function generatePassword() {
        const app = document.getElementById('app');
        app.classList.add('generating');
        
        const data = {
            length: parseInt(document.getElementById('length').value),
            uppercase: document.getElementById('uppercase').checked,
            lowercase: document.getElementById('lowercase').checked,
            digits: document.getElementById('digits').checked,
            symbols: document.getElementById('symbols').checked,
            exclude_ambiguous: document.getElementById('excludeAmbiguous').checked,
            use_words: document.getElementById('useWords').checked,
            category: activeCategory
        };
        
        try {
            const res = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await res.json();
            
            if (result.error) {
                alert(result.error);
                return;
            }
            
            document.getElementById('password').textContent = result.password;
            document.getElementById('strengthFill').style.width = result.strength_score + '%';
            document.getElementById('strengthFill').style.background = result.strength_color;
            document.getElementById('strengthText').textContent = result.strength;
            document.getElementById('strengthText').style.color = result.strength_color;
            
        } catch (err) {
            alert('Ошибка соединения');
        } finally {
            app.classList.remove('generating');
        }
    }
    
    function copyPassword() {
        const pwd = document.getElementById('password').textContent;
        if (pwd && pwd !== '••••••••••••') {
            navigator.clipboard.writeText(pwd).then(() => {
                const toast = document.getElementById('toast');
                toast.textContent = '✓ Пароль скопирован!';
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }
    }
    
    // Автогенерация
    window.onload = () => {
        setTimeout(generatePassword, 100);
    };
</script>

</body>
</html>
